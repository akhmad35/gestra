<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GESTRA — Latihan Menulis Huruf</title>
  <meta name="description" content="Latihan menulis huruf, angka, dan kata di GESTRA." />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/latihan.css" />
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <a href="beranda.html" class="navbar-brand">
      <img src="../assets/images/logo.png" alt="Logo GESTRA" />
      <span>GESTRA</span>
    </a>
    <div class="navbar-nav">
      <a href="beranda.html" class="nav-btn active" id="nav-beranda">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Beranda
      </a>
      <a href="profil.html" class="nav-btn inactive" id="nav-profil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Profil
      </a>
    </div>
  </nav>

  <!-- ── Page Content ── -->
  <main class="page-wrapper">

    <!-- Info Header -->
    <div class="info-header">
      <div class="info-header-text">
        <h2>
          <span style="color:#3B82F6; font-size:1.4rem;">?</span>
          Latihan Menulis Huruf
        </h2>
        <p>Pilih huruf yang ingin Anda tulis dari daftar di bawah ini.</p>
        <p>Lalu tuliskan di kanvas samping.</p>
      </div>
    </div>

    <!-- Practice Card -->
    <div class="card">
      <div class="practice-card-header">
        <h3>Coba Disini</h3>
        <button class="btn-primary" id="btn-mulai" onclick="mulaiLatihan()">
          Mulai
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>
      </div>

      <!-- Tab Bar -->
      <div class="tab-bar" id="tab-bar" role="tablist">
        <button class="tab-btn active" id="tab-angka"
                role="tab" aria-selected="true"
                onclick="switchTab('angka', this)">Angka</button>
        <button class="tab-btn" id="tab-huruf-besar"
                role="tab" aria-selected="false"
                onclick="switchTab('hurufBesar', this)">Huruf Besar</button>
        <button class="tab-btn" id="tab-huruf-kecil"
                role="tab" aria-selected="false"
                onclick="switchTab('hurufKecil', this)">Huruf Kecil</button>
      </div>

      <!-- Characters Grid -->
      <div class="chars-grid" id="chars-grid"></div>
    </div>

  </main>

  <script src="../js/latihan.js"></script>
</body>
</html>
