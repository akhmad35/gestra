<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GESTRA — Latihan Menulis Kata</title>
  <meta name="description" content="Latihan menulis kata di GESTRA." />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/latihan-kata.css" />
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <a href="beranda.html" class="navbar-brand">
      <img src="../assets/images/logo.png" alt="Logo GESTRA" />
      <span>GESTRA</span>
    </a>
    <div class="navbar-nav">
      <a href="beranda.html" class="nav-btn active" id="nav-beranda">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Beranda
      </a>
      <a href="profil.html" class="nav-btn inactive" id="nav-profil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Profil
      </a>
    </div>
  </nav>

  <!-- ── Page Content ── -->
  <main class="page-wrapper">

    <!-- Info Header -->
    <div class="info-header">
      <div class="info-header-text">
        <h2>
          <span style="color:#3B82F6; font-size:1.4rem;">?</span>
          Latihan Menulis Kata
        </h2>
        <p>Pilih kategori kata yang ingin Anda tulis dari daftar di bawah ini.</p>
        <p>Lalu tuliskan di kanvas samping.</p>
      </div>
    </div>

    <!-- Practice Card -->
    <div class="card">
      <div class="practice-card-header">
        <h3>Pilih Kategori Kata</h3>
        <button class="btn-primary" id="btn-mulai" onclick="mulaiLatihanKata()">
          Mulai
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>
      </div>

      <!-- Categories Grid -->
      <div class="category-grid" id="category-grid">
        <div class="category-card" onclick="selectCategory('Buah', this)">
          <span>Buah</span>
        </div>
        <div class="category-card" onclick="selectCategory('Hewan', this)">
          <span>Hewan</span>
        </div>
        <div class="category-card" onclick="selectCategory('Benda', this)">
          <span>Benda</span>
        </div>
        <div class="category-card" onclick="selectCategory('Hari', this)">
          <span>Hari</span>
        </div>
        <div class="category-card" onclick="selectCategory('Warna', this)">
          <span>Warna</span>
        </div>
        <div class="category-card" onclick="selectCategory('Negara', this)">
          <span>Negara</span>
        </div>
      </div>
    </div>

  </main>

  <script src="../js/latihan-kata.js"></script>
</body>
</html>
