{% extends "layout.html" %}

{% block title %}Speed Quiz - GESTRA{% endblock %}

{% block extra_css %}
<style>
    .quiz-container {
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
    }

    .timer-bar-container {
        width: 100%;
        height: 12px;
        background: #e2e8f0;
        border-radius: 9999px;
        margin-bottom: 2rem;
        overflow: hidden;
    }

    .timer-bar {
        height: 100%;
        width: 100%;
        background: #ef4444;
        border-radius: 9999px;
        transition: width 1s linear;
    }

    .quiz-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
    }

    .combo-badge {
        background: #f59e0b;
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 12px;
        font-weight: 800;
        font-size: 1.25rem;
        animation: bounce 0.5s;
        display: none;
    }

    .combo-badge.active {
        display: inline-block;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    .quiz-card {
        background: white;
        border-radius: 24px;
        padding: 3rem;
        text-align: center;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        margin-bottom: 2rem;
    }

    .question-image {
        max-width: 200px;
        margin: 0 auto 2rem;
        display: block;
        border-radius: 16px;
    }

    .options-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    .option-btn {
        background: #f8fafc;
        border: 2px solid #e2e8f0;
        padding: 1.5rem;
        border-radius: 16px;
        font-size: 1.25rem;
        font-weight: 600;
        color: #334155;
        cursor: pointer;
        transition: all 0.1s;
    }

    .option-btn:active {
        transform: scale(0.95);
    }
</style>
{% endblock %}

{% block content %}
<div class="top-toolbar">
    <a href="/murid/dashboard" class="reusable-back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Kembali
    </a>
</div>

<div class="quiz-container">
    <div class="quiz-header">
        <div class="combo-badge" id="combo-badge">🔥 COMBO x3!</div>
        <div style="font-size: 1.5rem; font-weight: 800; color: #10b981;">
            Skor: <span id="score">0</span>
        </div>
    </div>
    
    <div class="timer-bar-container">
        <div class="timer-bar" id="timer-bar"></div>
    </div>

    <div class="quiz-card">
        <h2 style="margin-top:0; color: #1e293b;">Tebak Gambar Cepat!</h2>
        <img src="https://via.placeholder.com/200" alt="Question Image" class="question-image">
        
        <div class="options-grid">
            <button class="option-btn" onclick="checkAnswer(this, true)">Kucing</button>
            <button class="option-btn" onclick="checkAnswer(this, false)">Anjing</button>
            <button class="option-btn" onclick="checkAnswer(this, false)">Ayam</button>
            <button class="option-btn" onclick="checkAnswer(this, false)">Bebek</button>
        </div>
    </div>
</div>

<script>
    let timeLeft = 100;
    let score = 0;
    let combo = 0;
    const timerBar = document.getElementById('timer-bar');
    
    const timer = setInterval(() => {
        timeLeft -= 1;
        timerBar.style.width = timeLeft + '%';
        if(timeLeft <= 0) {
            clearInterval(timer);
            alert('Waktu habis! Skor akhir: ' + score);
        }
    }, 300);

    function checkAnswer(btn, isCorrect) {
        if(isCorrect) {
            btn.style.background = '#10b981';
            btn.style.color = 'white';
            combo++;
            score += (100 * combo);
            document.getElementById('score').innerText = score;
            
            if(combo > 1) {
                const badge = document.getElementById('combo-badge');
                badge.innerText = '🔥 COMBO x' + combo;
                badge.classList.add('active');
                setTimeout(() => badge.classList.remove('active'), 1000);
            }
            
            setTimeout(() => {
                btn.style.background = '#f8fafc';
                btn.style.color = '#334155';
            }, 300);
        } else {
            btn.style.background = '#ef4444';
            btn.style.color = 'white';
            combo = 0;
            setTimeout(() => {
                btn.style.background = '#f8fafc';
                btn.style.color = '#334155';
            }, 300);
        }
    }
</script>
{% endblock %}
