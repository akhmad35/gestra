{% extends "layout.html" %}

{% block title %}GESTRA — Tulis Kata{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', path='css/canvas-latihan-kata.css') }}" />
{% endblock %}

{% block content %}
<main class="page-wrapper" style="max-width: 1000px;">
    <div class="card canvas-container">
        <div class="info-header" style="margin-bottom: 0; border: none; padding: 0;">
            <div class="info-header-text">
                <h2 style="font-size: 1.6rem;">
                    <span style="color:#3B82F6; border: 2px solid #E2E8F0; border-radius: 8px; padding: 2px 10px; font-size:1.4rem;">?</span>
                    Tulis kata di bawah ini
                </h2>
            </div>
        </div>

        <div class="target-box" style="display: flex; flex-direction: column; gap: 8px; padding: 20px; text-align: center; background: #f8fafc; border-radius: 12px; margin-bottom: 20px;">
            <div style="font-size: 1rem; color: #64748b; letter-spacing: 1.5px; font-weight: 600;">
                Target Kata: 
                <span id="word-target-display" style="color: #3B82F6; font-size: 2.0rem; font-weight: bold; padding: 0 4px;">-</span>
            </div>

            <div id="instruction-display" style="font-size: 1.6rem; color: #1e293b; margin-top: 10px; margin-bottom: 15px;">
                Tulis huruf ke-<span id="current-step-dash">1</span>: 
                <span id="active-letter-target" style="font-weight: 900; color: #3B82F6; background: #eff6ff; padding: 4px 18px; border-radius: 8px; border: 2px solid #dbeafe;">-</span>
            </div>

            <div id="word-ribbon" style="display: flex; gap: 10px; min-height: 80px; align-items: center; justify-content: center; flex-wrap: wrap;">
            </div>
        </div>

        <div class="workspace-grid">
            <div class="workspace-box">
                <div class="workspace-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                    Kamera
                </div>
                <div class="workspace-content dark" style="position: relative; overflow: hidden; display: flex;">
                    <video id="webcam" playsinline style="width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);"></video>
                    <canvas id="cameraOverlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;"></canvas>
                </div>
            </div>

            <div class="workspace-box">
                <div class="workspace-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </svg>
                    Hasil Menulis Kata
                </div>
                <div class="workspace-content" style="background: white; display: flex;">
                    <canvas id="paintCanvas" style="width: 100%; height: 100%;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="action-bar" style="margin-top: 20px; display: flex; justify-content: center; gap: 15px; width: 100%;">
        <button class="btn-kembali" onclick="resetCanvas()" style="font-size: 1.1rem; padding: 16px 36px; border-radius: 12px; border: 2px solid #cbd5e1; background: white; color: #475569; font-weight: 700; cursor: pointer; transition: all 0.2s;">
            Hapus Kanvas
        </button>
        <button class="btn-primary" onclick="periksaTulisan()" style="font-size: 1.1rem; padding: 16px 48px; border-radius: 12px; cursor: pointer; transition: all 0.2s;">
            Kirim Huruf
        </button>
    </div>

    <!-- Hidden form for saving and submitting to the GESTRA database -->
    <form action="/murid/latihan/{{ latihan.id }}/submit" method="POST" id="form-submit" style="display: none; margin: 0;">
        <input type="hidden" name="jawaban_text" id="final-answers" value="">
    </form>
</main>

<div id="modal-selesai" class="modal-overlay" style="display:none;">
    <div class="modal-box kuis-selesai">
        <div class="star-icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
            </svg>
        </div>
        <h3 id="modal-title">Selesai!</h3>
        <p id="modal-confidence" style="font-weight: 600; color: #64748b; margin-bottom: 20px;"></p>

        <div class="modal-actions">
            <button class="btn-kembali" onclick="closeKuisSelesaiModal()">Kembali</button>
            <button class="btn-cek-nilai" onclick="window.location.href='/murid/riwayat-nilai'">Cek Nilai</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="{{ url_for('static', path='js/canvas-latihan-kata.js') }}"></script>
<script>
    // 1. Parse classroom questions from Python
    const soalList = JSON.parse('{{ soal_list|safe }}') || [];
    const urlParams = new URLSearchParams(window.location.search);
    const currentIndex = parseInt(urlParams.get('index')) || 0;

    // Reset session storage data when beginning the quiz
    if (currentIndex === 0) {
        sessionStorage.removeItem('gestra_answers');
    }

    // 2. Render modern classroom top navigation
    document.addEventListener("DOMContentLoaded", () => {
        const totalSoal = soalList.length;

        // Custom stats progress header inside the canvas card
        const progressHeader = document.createElement('div');
        progressHeader.style = "display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding: 0.75rem 1.5rem; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; width: 100%; box-sizing: border-box;";
        progressHeader.innerHTML = `
            <div style="font-weight: 800; color: #1e293b; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem;">
                <span style="background: #3B82F6; color: white; width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.8rem;">Q</span>
                Soal ${currentIndex + 1} dari ${totalSoal}
            </div>
            <div style="font-weight: 800; color: #64748b; font-size: 0.95rem; display: flex; align-items: center; gap: 0.4rem;">
                Progres Latihan: ${Math.round((currentIndex / totalSoal) * 100)}%
            </div>
        `;

        const cardElement = document.querySelector('.card.canvas-container');
        if (cardElement) {
            cardElement.insertBefore(progressHeader, cardElement.firstChild);
        }

        // Custom exit toolbar above the card
        const exitToolbar = document.createElement('div');
        exitToolbar.style = "margin-bottom: 15px; display: flex; justify-content: flex-start; width: 100%;";
        exitToolbar.innerHTML = `
            <a href="javascript:void(0)" onclick="confirmQuit()" style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.25rem; background: #f1f5f9; color: #334155; border-radius: 8px; font-weight: 700; text-decoration: none; font-size: 0.9rem; transition: all 0.2s; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Keluar Latihan
            </a>
        `;
        const mainElement = document.querySelector('.page-wrapper');
        if (mainElement) {
            mainElement.insertBefore(exitToolbar, mainElement.firstChild);
        }
    });

    function confirmQuit() {
        if (confirm("Apakah kamu yakin ingin keluar? Progres latihan ini tidak akan disimpan.")) {
            window.location.href = "/murid/kelas/{{ latihan.kelas_id }}/latihan";
        }
    }

    // 3. Monkey-patch finalValidation to transition questions or complete the quiz
    finalValidation = async function() {
        // Calculate the score of the completed word based on individual letter attempts
        const finalScore = letterScores.reduce((a, b) => a + b, 0) / targetWord.length;

        let answers = JSON.parse(sessionStorage.getItem('gestra_answers') || '[]');
        answers[currentIndex] = {
            soal: targetWord,
            jawaban: collectedPredictions,
            benar: finalScore >= 80,
            nilai: Math.round(finalScore),
            image: paintCanvas.toDataURL('image/png')
        };
        sessionStorage.setItem('gestra_answers', JSON.stringify(answers));

        if (currentIndex < soalList.length - 1) {
            // Next question redirection
            const nextIndex = currentIndex + 1;
            const nextWord = soalList[nextIndex].label;
            window.location.href = `/murid/latihan/{{ latihan.id }}/kerjakan?target=${encodeURIComponent(nextWord)}&index=${nextIndex}`;
        } else {
            // Final classroom completion modal
            showFinalQuizSelesai(answers);
        }
    }

    function showFinalQuizSelesai(answers) {
        let correctCount = 0;
        let sumScores = 0;
        answers.forEach(ans => {
            if (ans.benar) correctCount++;
            sumScores += ans.nilai;
        });

        const avgScore = Math.round(sumScores / answers.length);

        const modal = document.getElementById("modal-selesai");
        const title = document.getElementById("modal-title");
        const confidenceText = document.getElementById("modal-confidence");

        title.innerText = "Latihan Selesai! 🎉";
        title.style.color = "#4f46e5";

        confidenceText.innerHTML = `Hebat! Kamu telah menyelesaikan seluruh latihan.<br>Nilai Rata-rata Latihan: <strong style="font-size: 2.2rem; color: #4f46e5; display: block; margin-top: 8px;">${avgScore}</strong>`;

        const btnKembali = modal.querySelector(".btn-kembali");
        if (btnKembali) btnKembali.style.display = "none";

        const btnSelesai = modal.querySelector(".btn-cek-nilai");
        if (btnSelesai) {
            btnSelesai.innerText = "Kirim Nilai Latihan 🚀";
            btnSelesai.style.background = "#3B82F6";
            btnSelesai.style.color = "white";
            btnSelesai.style.fontWeight = "bold";
            btnSelesai.style.padding = "10px 20px";
            btnSelesai.style.borderRadius = "8px";
            btnSelesai.onclick = function() {
                document.getElementById('final-answers').value = JSON.stringify(answers);
                document.getElementById('form-submit').submit();
            };
        }

        speak(`Hebat! Kamu telah menyelesaikan seluruh latihan kata.`);
        modal.style.display = "flex";
    }
</script>
{% endblock %}
