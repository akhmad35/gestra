{% extends "layout.html" %}

{% block title %}GESTRA — Edit Profil{% endblock %}

{% block extra_css %}
<style>
    .edit-profile-container {
        max-width: 600px;
        margin: 4rem auto;
        padding: 2.5rem;
        background: white;
        border-radius: 24px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    .edit-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .edit-header h1 {
        font-size: 1.75rem;
        font-weight: 800;
        color: #1e293b;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 0.5rem;
    }

    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 1rem;
        transition: border-color 0.2s;
    }

    .form-control:focus {
        border-color: #6366f1;
        outline: none;
    }

    .btn-save {
        width: 100%;
        background: #1e293b;
        color: white;
        border: none;
        padding: 1rem;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        margin-top: 1rem;
        transition: opacity 0.2s;
    }

    .btn-save:hover {
        opacity: 0.9;
    }

    .alert {
        padding: 1rem;
        border-radius: 12px;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
        font-weight: 600;
    }

    .alert-error {
        background: #fee2e2;
        color: #ef4444;
    }

    .btn-cancel {
        display: block;
        text-align: center;
        margin-top: 1.5rem;
        color: #64748b;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}
<main class="page-wrapper">
    <div class="edit-profile-container">
        <div class="edit-header">
            <h1>Edit Profil</h1>
            <p>Perbarui informasi akun Anda di sini.</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
        {% endif %}

        <form action="/edit-profile" method="POST">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" class="form-control" value="{{ user.nama }}" required>
            </div>

            <div class="form-group">
                <label for="email">Email / Username</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ user.email }}" required>
            </div>

            <div class="form-group">
                <label for="password">Password Baru (Kosongkan jika tidak ingin mengubah)</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-save">Simpan Perubahan</button>
        </form>

        <a href="/profile" class="btn-cancel">Batal</a>
    </div>
</main>
{% endblock %}
