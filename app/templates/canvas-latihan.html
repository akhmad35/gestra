<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GESTRA — Tulis Huruf</title>
  <meta name="description" content="Latihan menulis huruf dengan kamera di GESTRA." />
  <link rel="stylesheet" href="{{ url_for('static', path='css/global.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', path='css/canvas-latihan.css') }}" />
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <a href="/beranda" class="navbar-brand">
      <img src="{{ url_for('static', path='assets/images/logo.png') }}" alt="Logo GESTRA" />
      <span>GESTRA</span>
    </a>
    <div class="navbar-nav">
      <a href="/beranda" class="nav-btn inactive" id="nav-beranda">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Beranda
      </a>
      <a href="/profil" class="nav-btn inactive" id="nav-profil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Profil
      </a>
    </div>
  </nav>

  <!-- ── Page Content ── -->
  <main class="page-wrapper" style="max-width: 1000px;">

    <div class="card canvas-container">
      
      <!-- Header -->
      <div class="info-header" style="margin-bottom: 0; border: none; padding: 0;">
        <div class="info-header-text">
          <h2 style="font-size: 1.6rem;">
            <span style="color:#3B82F6; border: 2px solid #E2E8F0; border-radius: 8px; padding: 2px 10px; font-size:1.4rem;">?</span>
            Tulis huruf dibawah ini
          </h2>
        </div>
      </div>

      <!-- Target Box -->
      <div class="target-box">
        <span class="target-char">A</span>
      </div>

      <!-- Workspace Area -->
      <div class="workspace-grid">
        <!-- Kamera -->
        <div class="workspace-box">
          <div class="workspace-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            Kamera
          </div>
          <div class="workspace-content dark">
            <span class="placeholder-char">A</span>
          </div>
        </div>

        <!-- Hasil Menulis -->
        <div class="workspace-box">
          <div class="workspace-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 20h9"/>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
            Hasil Menulis
          </div>
          <div class="workspace-content">
            <span class="placeholder-char">A</span>
          </div>
        </div>
      </div>

    </div>

    <div class="action-bar">
      <button class="btn-primary" onclick="showKuisSelesaiModal()" style="font-size: 1.1rem; padding: 16px 48px; border-radius: 12px;">
        Periksa Tulisan
      </button>
    </div>

  </main>

  <!-- ── Modal Kuis Selesai ── -->
  <div id="modal-selesai" class="modal-overlay" style="display:none;">
    <div class="modal-box kuis-selesai">
      <div class="star-icon">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      </div>
      <h3>Kuis Selesai!</h3>
      <div class="modal-actions">
        <button class="btn-kembali" onclick="closeKuisSelesaiModal()">Kembali</button>
        <button class="btn-cek-nilai" onclick="window.location.href='/profil'">Cek Nilai</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', path='js/canvas-latihan.js') }}"></script>
</body>
</html>
