<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error - GESTRA</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/global.css') }}" />
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .error-container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }

    .error-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      color: #e74c3c;
    }

    .error-container h1 {
      color: #333;
      margin: 0 0 10px 0;
      font-size: 1.8rem;
    }

    .error-container p {
      color: #666;
      margin: 0 0 30px 0;
      line-height: 1.6;
    }

    .error-container a {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.3s;
    }

    .error-container a:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  {% include "components/back_button.html" %}
  <div class="error-container">
    <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <h1>Oops! Terjadi Kesalahan</h1>
    <p>{{ message }}</p>
    <a href="/kelas/daftar">Kembali ke Daftar Kelas</a>
  </div>
  <script src="{{ url_for('static', path='js/back-button.js') }}"></script>
</body>
</html>
