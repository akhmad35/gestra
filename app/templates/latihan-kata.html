  <main class="page-wrapper" style="padding-top: 0;">

    <div class="riwayat-back-shell">
      <a href="/beranda" class="riwayat-back-btn" id="riwayat-back" title="Kembali ke halaman sebelumnya">

    <div class="info-header">
      <div class="info-header-text">

    <!-- Practice Card -->
    <div class="card">
      <div class="practice-card-header">
        <h3>Pilih Kategori Kata</h3>
        <button class="btn-primary" id="btn-mulai" onclick="mulaiLatihanKata()">
          Mulai
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
        </button>
      </div>

      <!-- Categories Grid -->
      <div class="category-grid" id="category-grid">
        <!-- Buah -->
        <div class="category-card" onclick="selectCategory('Buah', this)">
          <div class="category-card-thumbnail">
            <img src="{{ url_for('static', path='assets/images/buah.png') }}?v=3" alt="Buah"

          </div>
          <div class="category-card-footer">
            <span>Buah</span>
          </div>
        </div>

        <div class="category-card" onclick="selectCategory('Hewan', this)">
