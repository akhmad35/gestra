{% extends "layout.html" %}

{% block title %}GESTRA — Tulis Kata{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', path='css/canvas-latihan-kata.css') }}" />
{% endblock %}

{% block content %}
<main class="page-wrapper" style="max-width: 1000px;">
    <div class="card canvas-container">
        <div class="info-header" style="margin-bottom: 0; border: none; padding: 0;">
            <div class="info-header-text">
                <h2 style="font-size: 1.6rem;">
                    <span style="color:#3B82F6; border: 2px solid #E2E8F0; border-radius: 8px; padding: 2px 10px; font-size:1.4rem;">?</span>
                    Tulis kata di bawah ini
                </h2>
            </div>
        </div>

        <div class="target-box" style="display: flex; flex-direction: column; gap: 8px; padding: 20px; text-align: center; background: #f8fafc; border-radius: 12px; margin-bottom: 20px;">
            <div style="font-size: 1rem; color: #64748b; letter-spacing: 1.5px; font-weight: 600;">
                Target Kata: 
                <span id="word-target-display" style="color: #3B82F6; font-size: 2.0rem; font-weight: bold; padding: 0 4px;">-</span>
            </div>

            <div id="instruction-display" style="font-size: 1.6rem; color: #1e293b; margin-top: 10px; margin-bottom: 15px;">
                Tulis huruf ke-<span id="current-step-dash">1</span>: 
                <span id="active-letter-target" style="font-weight: 900; color: #3B82F6; background: #eff6ff; padding: 4px 18px; border-radius: 8px; border: 2px solid #dbeafe;">-</span>
            </div>

            <div id="word-ribbon" style="display: flex; gap: 10px; min-height: 80px; align-items: center; justify-content: center; flex-wrap: wrap;">
                </div>
        </div>

        <div class="workspace-grid">
            <div class="workspace-box">
                <div class="workspace-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                    Kamera
                </div>
                <div class="workspace-content dark" style="position: relative; overflow: hidden; display: flex;">
                    <video id="webcam" playsinline style="width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);"></video>
                    <canvas id="cameraOverlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;"></canvas>
                </div>
            </div>

            <div class="workspace-box">
                <div class="workspace-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </svg>
                    Hasil Menulis Kata
                </div>
                <div class="workspace-content" style="background: white; display: flex;">
                    <canvas id="paintCanvas" style="width: 100%; height: 100%;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn-primary" onclick="periksaTulisan()" style="font-size: 1.1rem; padding: 16px 48px; border-radius: 12px;">
            Kirim Huruf
        </button>
    </div>
</main>

<div id="modal-selesai" class="modal-overlay" style="display:none;">
    <div class="modal-box kuis-selesai">
        <div class="star-icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
            </svg>
        </div>
        <h3 id="modal-title">Selesai!</h3>
        <p id="modal-confidence" style="font-weight: 600; color: #64748b; margin-bottom: 20px;"></p>

        <div class="modal-actions">
            <button class="btn-kembali" onclick="closeKuisSelesaiModal()">Kembali</button>
            <button class="btn-cek-nilai" onclick="window.location.href='/murid/riwayat-nilai'">Cek Nilai</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="{{ url_for('static', path='js/canvas-latihan-kata.js') }}"></script>
{% endblock %}
