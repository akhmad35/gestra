{% extends "layout.html" %}

{% block title %}Buat Latihan Baru - GESTRA{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 800px;
        margin: 4rem auto;
        padding: 2.5rem;
        background: white;
        border-radius: 24px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    .form-header {
        margin-bottom: 2rem;
    }

    .form-header h1 {
        font-size: 1.75rem;
        font-weight: 800;
        color: #1e293b;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 0.5rem;
    }

    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 1rem;
        transition: border-color 0.2s;
    }

    .form-control:focus {
        border-color: #6366f1;
        outline: none;
    }

    .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    textarea.form-control {
        resize: vertical;
        min-height: 150px;
    }

    .btn-submit {
        width: 100%;
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        color: white;
        border: none;
        padding: 1rem;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        margin-top: 1rem;
        transition: opacity 0.2s;
    }

    .btn-submit:hover {
        opacity: 0.9;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1>Buat Latihan Baru</h1>
        <p>Kelas: <strong>{{ kelas.nama_kelas }}</strong></p>
    </div>

    <form action="/guru/latihan/buat/{{ kelas.id }}" method="POST">
        <div class="form-group">
            <label for="judul">Judul Latihan</label>
            <input type="text" id="judul" name="judul" class="form-control" placeholder="Contoh: Latihan Menulis Kata 'Ibu'" required>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label for="tipe_soal">Tipe Latihan</label>
                <select id="tipe_soal" name="tipe_soal" class="form-control">
                    <option value="essay">Essay / Menulis</option>
                    <option value="pilihan_ganda">Pilihan Ganda</option>
                    <option value="isian">Isian Singkat</option>
                </select>
            </div>
            <div class="form-group">
                <label for="tingkat_kesulitan">Tingkat Kesulitan</label>
                <select id="tingkat_kesulitan" name="tingkat_kesulitan" class="form-control">
                    <option value="mudah">Mudah</option>
                    <option value="sedang">Sedang</option>
                    <option value="sulit">Sulit</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="pertanyaan">Instruksi / Pertanyaan</label>
            <textarea id="pertanyaan" name="pertanyaan" class="form-control" placeholder="Tuliskan instruksi atau pertanyaan untuk siswa..." required></textarea>
        </div>

        <button type="submit" class="btn-submit">Simpan Latihan</button>
    </form>

    <a href="/guru/kelas/{{ kelas.id }}/detail" style="display: block; text-align: center; margin-top: 1.5rem; color: #64748b; text-decoration: none; font-size: 0.875rem; font-weight: 600;">← Batal</a>
</div>
{% endblock %}
