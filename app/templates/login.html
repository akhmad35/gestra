<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GESTRA — Masuk</title>
  <meta name="description" content="Masuk ke GESTRA, platform belajar menulis interaktif untuk anak-anak." />
  <link rel="stylesheet" href="{{ url_for('static', path='css/global.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', path='css/login.css') }}" />
</head>
<body class="login-body">

  <div class="login-container">

    <!-- ── Left Panel ── -->
    <div class="login-left">
      <img
        src="{{ url_for('static', path='assets/images/mascot.png') }}?v=2"
        alt="Maskot GESTRA"
        class="login-mascot"
        id="login-mascot"
      />
      <p class="login-quote">"Aku bisa membacakan<br>semua tulisan untukmu!"</p>

      <div class="sound-badge">
        <div class="sound-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round" width="28" height="28">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </div>
        <p>Website ini dibuat agar semua<br>bagiannya bisa bersuara</p>
      </div>
    </div>

    <!-- ── Right Panel — Login Card ── -->
    <div class="login-card">

      <div class="login-logo">
        <img src="{{ url_for('static', path='assets/images/logo.png') }}" alt="Logo GESTRA" />
        <h1>GESTRA</h1>
      </div>

      {% if error %}
      <div style="background: #fee2e2; color: #ef4444; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
        {{ error }}
      </div>
      {% endif %}

      <form id="login-form" method="POST" action="/login">

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="toni12@gmail.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn-masuk" id="btn-masuk">Masuk</button>

        <div class="divider">
          <div class="divider-line"></div>
          <span>Atau</span>
          <div class="divider-line"></div>
        </div>

        <button type="button" class="btn-google" id="btn-google">
          <!-- Google G icon -->
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Masuk dengan Google
        </button>

        <div class="register-section">
          <p>Belum punya akun?</p>
          <button type="button" class="btn-daftar" id="btn-daftar"
                  onclick="window.location.href='/register'">
            Daftar Sekarang
          </button>
        </div>

      </form>
    </div>

  </div>

  <script src="{{ url_for('static', path='js/login.js') }}"></script>
  <script src="{{ url_for('static', path='js/back-button.js') }}"></script>
</body>
</html>
