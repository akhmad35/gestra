<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GESTRA — Pilih Peran</title>
  <meta name="description" content="Pilih peran Anda sebagai siswa atau guru di platform GESTRA." />
  <link rel="stylesheet" href="{{ url_for('static', path='css/global.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', path='css/pilih-peran.css') }}" />
</head>
<body class="role-body">
  {% include "components/back_button.html" %}

  <div class="role-container">
    <div class="role-card">
      <h1 class="role-title">Pilih Peran Anda</h1>
      
      <form method="POST" action="/pilih-peran">
        <div class="role-options">
          
          <!-- Siswa Option -->
          <div class="role-option-card">
            <div class="role-icon">
              <!-- Student Icon (Graduation Cap + Person) -->
              <svg viewBox="0 0 24 24" fill="currentColor" width="80" height="80">
                <path d="M12 3L1 9L12 15L21 10.09V17H23V9L12 3ZM12 12.8L4.22 8.5L12 4.2L19.78 8.5L12 12.8Z"/>
                <path d="M6 14.27V15C6 18.31 8.69 21 12 21C15.31 21 18 18.31 18 15V14.27C16.32 15.68 14.26 16.5 12 16.5C9.74 16.5 7.68 15.68 6 14.27Z"/>
              </svg>
            </div>
            <button type="submit" name="role" value="murid" class="btn-role">Saya adalah seorang<br>siswa</button>
          </div>

          <!-- Guru Option -->
          <div class="role-option-card">
            <div class="role-icon">
              <!-- Teacher Icon (Person with book/pointer) -->
              <svg viewBox="0 0 24 24" fill="currentColor" width="80" height="80">
                <path d="M12 11C14.21 11 16 9.21 16 7C16 4.79 14.21 3 12 3C9.79 3 8 4.79 8 7C8 9.21 9.79 11 12 11ZM12 13C9.33 13 4 14.34 4 17V21H20V17C20 14.34 14.67 13 12 13Z"/>
                <circle cx="20" cy="19" r="3" fill="currentColor"/>
                <path d="M2.5 17L4 12H6L4.5 17H2.5Z" fill="currentColor"/>
              </svg>
            </div>
            <button type="submit" name="role" value="guru" class="btn-role">Saya adalah seorang<br>guru</button>
          </div>

        </div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', path='js/back-button.js') }}"></script>
</body>
</html>
